limit_req_zone $binary_remote_addr zone=zip_rate:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=asset_rate:10m rate=1200r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Cache static assets (images, JS, CSS)
    location /assets/ {
        limit_req zone=asset_rate burst=400 nodelay;
        limit_conn perip 30;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /icons/ {
        limit_req zone=asset_rate burst=400 nodelay;
        limit_conn perip 30;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /category-downloads/ {
        limit_req zone=zip_rate burst=10 nodelay;
        limit_conn perip 20;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /categories/ {
        limit_req zone=asset_rate burst=400 nodelay;
        limit_conn perip 30;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /downloads/ {
        limit_req zone=zip_rate burst=10 nodelay;
        limit_conn perip 20;
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

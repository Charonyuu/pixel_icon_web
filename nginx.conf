server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Cache static assets (images, JS, CSS)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /icons/ {
        expires 7d;
        add_header Cache-Control "public";
        valid_referers none blocked server_names;
        if ($invalid_referer) {
            return 403;
        }
    }

    location /category-downloads/ {
        expires 7d;
        add_header Cache-Control "public";
        valid_referers none blocked server_names;
        if ($invalid_referer) {
            return 403;
        }
    }

    location /categories/ {
        expires 7d;
        add_header Cache-Control "public";
        valid_referers none blocked server_names;
        if ($invalid_referer) {
            return 403;
        }
    }

    location /downloads/ {
        valid_referers none blocked server_names;
        if ($invalid_referer) {
            return 403;
        }
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

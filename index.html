<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICON 像素圖示庫</title>
    <meta name="description" content="可愛像素風圖示庫，支援分類瀏覽與下載。" />
    <link rel="icon" type="image/png" href="/site-metadata.png" />
    <meta property="og:title" content="ICON 像素圖示庫" />
    <meta
      property="og:description"
      content="可愛像素風圖示庫，支援分類瀏覽與下載。"
    />
    <meta property="og:image" content="/site-metadata.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ICON 像素圖示庫" />
    <meta
      name="twitter:description"
      content="可愛像素風圖示庫，支援分類瀏覽與下載。"
    />
    <meta name="twitter:image" content="/site-metadata.png" />
    <script>
      (function (config) {
        var SITE = config.site;
        var API_BASE = config.apiBase;

        function getSessionId() {
          var id = sessionStorage.getItem("_analytics_sid");
          if (!id) {
            id = "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(
              /[xy]/g,
              function (c) {
                var r = (Math.random() * 16) | 0;
                return (c === "x" ? r : (r & 0x3) | 0x8).toString(16);
              }
            );
            sessionStorage.setItem("_analytics_sid", id);
          }
          return id;
        }

        function send(endpoint, data) {
          var payload = JSON.stringify(
            Object.assign({}, data, { site: SITE, sessionId: getSessionId() })
          );
          if (navigator.sendBeacon) {
            navigator.sendBeacon(
              API_BASE + endpoint,
              new Blob([payload], { type: "application/json" })
            );
          } else {
            fetch(API_BASE + endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: payload,
              keepalive: true,
            }).catch(function () {});
          }
        }

        function trackPageview() {
          send("/api/pageview", {
            path: location.pathname + location.search,
            referrer: document.referrer || "",
          });
        }

        function trackEvent(eventName, options) {
          options = options || {};
          send("/api/event", {
            eventName: eventName,
            elementId: options.elementId || "",
            path: location.pathname + location.search,
            metadata: options.metadata || {},
          });
        }

        function bindAutoTrack() {
          document.addEventListener(
            "click",
            function (e) {
              var el = e.target.closest("[data-track]");
              if (!el) return;
              var eventName = el.getAttribute("data-track");
              var elementId = el.id || el.getAttribute("data-track-id") || "";
              var metadata = {};
              try {
                var raw = el.getAttribute("data-track-meta");
                if (raw) metadata = JSON.parse(raw);
              } catch (err) {}
              trackEvent(eventName, {
                elementId: elementId,
                metadata: metadata,
              });
            },
            true
          );
        }

        function bindSPATracking() {
          var _push = history.pushState.bind(history);
          var _replace = history.replaceState.bind(history);
          history.pushState = function () {
            _push.apply(this, arguments);
            trackPageview();
          };
          history.replaceState = function () {
            _replace.apply(this, arguments);
            trackPageview();
          };
          window.addEventListener("popstate", trackPageview);
          window.addEventListener("hashchange", trackPageview);
        }

        function init() {
          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", function () {
              trackPageview();
              bindAutoTrack();
            });
          } else {
            trackPageview();
            bindAutoTrack();
          }
          bindSPATracking();
        }

        window.Analytics = { track: trackEvent, site: SITE };
        init();
      })({
        site: "icons",
        apiBase: "https://analysis-service.app.charonyu.cc",
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
